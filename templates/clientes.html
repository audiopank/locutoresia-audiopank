<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes - Locutores IA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #6366f1;
            --dark-bg: #0f172a;
            --card-bg: #1e293b;
            --border-color: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --good: #22c55e;
            --warn: #f59e0b;
            --crit: #ef4444;
        }
        body {
            background: linear-gradient(135deg, var(--dark-bg) 0%, #1a1f3a 100%);
            color: var(--text-primary);
            min-height: 100vh;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        .page-container { padding: 2rem; max-width: 1100px; margin: 0 auto; }
        .section-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .back-link { color: var(--text-secondary); text-decoration: none; }
        .back-link:hover { color: var(--text-primary); }

        /* KPIs do topo */
        .kpi-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
        .kpi {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 1rem 1.25rem;
        }
        .kpi .k-label {
            font-size: .72rem; letter-spacing: .08em; text-transform: uppercase;
            color: var(--text-secondary);
        }
        .kpi .k-value { font-size: 1.9rem; font-weight: 700; margin-top: .2rem; font-variant-numeric: tabular-nums; }

        /* Card de cliente */
        .client-card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 1.25rem;
            margin-bottom: 1rem;
        }
        .client-head { display: flex; align-items: center; gap: .85rem; }
        .avatar {
            width: 46px; height: 46px; border-radius: 10px; flex: 0 0 46px;
            background: rgba(99, 102, 241, 0.18); color: #a5b4fc;
            display: grid; place-items: center; font-weight: 700; font-size: 1.05rem;
        }
        .client-head .c-name { font-weight: 700; font-size: 1.05rem; }
        .client-head .c-contact { color: var(--text-secondary); font-size: .82rem; }

        .tiles { display: grid; grid-template-columns: repeat(4, 1fr); gap: .6rem; margin-top: 1rem; }
        .tile {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid var(--border-color);
            border-radius: 8px; padding: .6rem .75rem;
        }
        .tile .t-k { font-size: .64rem; letter-spacing: .06em; text-transform: uppercase; color: var(--text-secondary); }
        .tile .t-v { font-size: 1.25rem; font-weight: 700; margin-top: .1rem; font-variant-numeric: tabular-nums; }
        .t-v.good { color: var(--good); }
        .t-v.warn { color: var(--warn); }

        /* Painel de IA */
        .ai-card {
            background:
                radial-gradient(120% 140% at 0% 0%, rgba(99, 102, 241, 0.16), transparent 55%),
                var(--card-bg);
            border-color: rgba(99, 102, 241, 0.35);
        }
        .ai-head { display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
        .ai-title { font-weight: 700; font-size: 1.15rem; }
        .ai-sub { color: var(--text-secondary); font-size: .85rem; margin-top: .15rem; }
        .ai-btn {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff; font-weight: 600; border: none; white-space: nowrap;
        }
        .ai-btn:hover { filter: brightness(1.08); color: #fff; }
        .ai-btn:disabled { opacity: .7; }

        .insight-resumo {
            font-size: 1.02rem; line-height: 1.5; font-weight: 600;
            border-left: 3px solid var(--primary-color); padding-left: .8rem; margin-bottom: 1rem;
        }
        .insight-points { display: flex; flex-direction: column; gap: .55rem; margin-bottom: 1rem; }
        .insight-point { display: flex; align-items: flex-start; gap: .6rem; font-size: .92rem; }
        .insight-point .pi { flex: 0 0 auto; margin-top: .15rem; }
        .insight-point.positivo .pi { color: var(--good); }
        .insight-point.atencao .pi { color: var(--warn); }
        .insight-rec {
            background: rgba(99, 102, 241, 0.12); border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 8px; padding: .75rem .9rem; font-size: .9rem;
        }
        .insight-rec .rec-k {
            font-size: .68rem; letter-spacing: .08em; text-transform: uppercase;
            color: #a5b4fc; display: block; margin-bottom: .2rem;
        }
        .ai-note { color: var(--text-secondary); font-size: .9rem; }
        .ai-note .mini-stats { margin-top: .6rem; font-variant-numeric: tabular-nums; color: var(--text-primary); }

        .status-badge-pendente { background: #f59e0b; }
        .status-badge-aprovado { background: #22c55e; }
        .status-badge-ajuste_solicitado { background: #ef4444; }

        .history { margin-top: 1rem; border-top: 1px dashed var(--border-color); padding-top: .85rem; }
        .hist-item {
            display: flex; align-items: flex-start; gap: .6rem;
            padding: .5rem 0; border-bottom: 1px solid rgba(51, 65, 85, 0.5);
        }
        .hist-item:last-child { border-bottom: none; }
        .hist-item .h-main { flex: 1; min-width: 0; }
        .hist-item .h-desc { font-size: .9rem; }
        .hist-item .h-date { font-size: .72rem; color: var(--text-secondary); font-variant-numeric: tabular-nums; }
        .hist-item .h-feedback { font-size: .78rem; color: #fca5a5; margin-top: .2rem; }
        .toggle-btn { color: var(--text-secondary); }
        @media (max-width: 640px) {
            .kpi-row { grid-template-columns: 1fr; }
            .tiles { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="page-container">
        <a href="/" class="back-link"><i class="fas fa-arrow-left me-2"></i>Voltar para Início</a>
        <h2 class="mt-3 mb-1"><i class="fas fa-address-card me-2"></i>Clientes</h2>
        <p class="text-secondary mb-4">Ficha 360° — cada cliente com todo o histórico de entregas e a taxa de aprovação.</p>

        <div class="section-card ai-card">
            <div class="ai-head">
                <div>
                    <div class="ai-title"><i class="fas fa-wand-magic-sparkles me-2"></i>Análise de Performance</div>
                    <div class="ai-sub">A IA lê seu histórico e diz o que faz o cliente aprovar de primeira.</div>
                </div>
                <button class="btn ai-btn" id="insightBtn" onclick="loadInsight()">
                    <i class="fas fa-bolt me-1"></i>Gerar análise
                </button>
            </div>
            <div id="insightArea" class="mt-3" style="display:none;"></div>
        </div>

        <div class="section-card">
            <div class="kpi-row" id="kpiRow">
                <div class="kpi"><div class="k-label">Clientes</div><div class="k-value">–</div></div>
                <div class="kpi"><div class="k-label">Entregas no total</div><div class="k-value">–</div></div>
                <div class="kpi"><div class="k-label">Aprovação média</div><div class="k-value">–</div></div>
            </div>
        </div>

        <div class="section-card">
            <h5 class="mb-3">Fichas de cliente</h5>
            <div id="clientsList"><p class="text-secondary">Carregando...</p></div>
        </div>
    </div>

    <script>
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text || '';
            return div.innerHTML;
        }

        function statusLabel(status) {
            if (status === 'aprovado') return 'Aprovado';
            if (status === 'ajuste_solicitado') return 'Ajuste Solicitado';
            return 'Pendente';
        }

        function formatDate(iso) {
            if (!iso) return '—';
            const d = new Date(iso);
            if (isNaN(d)) return '—';
            return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' });
        }

        function initials(name) {
            const parts = (name || '?').trim().split(/\s+/).filter(Boolean);
            if (parts.length === 0) return '?';
            if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
            return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
        }

        function toggleHistory(idx) {
            const el = document.getElementById('hist-' + idx);
            const btn = document.getElementById('togglebtn-' + idx);
            if (!el) return;
            const open = el.style.display !== 'none';
            el.style.display = open ? 'none' : 'block';
            btn.innerHTML = open
                ? '<i class="fas fa-chevron-down me-1"></i>Ver histórico'
                : '<i class="fas fa-chevron-up me-1"></i>Ocultar histórico';
        }

        function renderKpis(clients) {
            const totalClientes = clients.length;
            const totalEntregas = clients.reduce((s, c) => s + c.total, 0);
            const totalAprovadas = clients.reduce((s, c) => s + c.aprovadas, 0);
            const aprovMedia = totalEntregas ? Math.round(totalAprovadas / totalEntregas * 100) : 0;
            document.getElementById('kpiRow').innerHTML = `
                <div class="kpi"><div class="k-label">Clientes</div><div class="k-value">${totalClientes}</div></div>
                <div class="kpi"><div class="k-label">Entregas no total</div><div class="k-value">${totalEntregas}</div></div>
                <div class="kpi"><div class="k-label">Aprovação média</div><div class="k-value" style="color:${aprovMedia >= 70 ? 'var(--good)' : 'var(--warn)'}">${aprovMedia}%</div></div>
            `;
        }

        function historyHtml(deliveries) {
            return deliveries.map(d => {
                const feedback = (d.status === 'ajuste_solicitado' && d.feedback)
                    ? `<div class="h-feedback"><i class="fas fa-comment-dots me-1"></i>${escapeHtml(d.feedback)}</div>`
                    : '';
                return `
                    <div class="hist-item">
                        <span class="badge status-badge-${d.status}">${statusLabel(d.status)}</span>
                        <div class="h-main">
                            <div class="h-desc">${escapeHtml(d.request_description) || '<span class="text-secondary">(sem descrição)</span>'}</div>
                            <div class="h-date">${formatDate(d.created_at)}</div>
                            ${feedback}
                        </div>
                        <a href="/aprovacao/${d.id}" target="_blank" rel="noopener" class="btn btn-sm btn-outline-light" title="Abrir link de aprovação">
                            <i class="fas fa-arrow-up-right-from-square"></i>
                        </a>
                    </div>
                `;
            }).join('');
        }

        function miniStats(s) {
            if (!s || !s.total) return '';
            return `<div class="mini-stats">${s.total} entrega(s) · ${s.taxa_aprovacao}% de aprovação · ${s.clientes} cliente(s)</div>`;
        }

        function renderInsight(data) {
            const area = document.getElementById('insightArea');
            area.style.display = 'block';

            if (data.status === 'poucos_dados' || data.status === 'sem_ia') {
                area.innerHTML = `<div class="ai-note"><i class="fas fa-circle-info me-1"></i>${escapeHtml(data.message)}${miniStats(data.stats)}</div>`;
                return;
            }

            const ins = data.insight || {};
            const pontos = Array.isArray(ins.pontos) ? ins.pontos : [];
            const pontosHtml = pontos.map(p => {
                const tipo = p.tipo === 'positivo' ? 'positivo' : 'atencao';
                const icon = tipo === 'positivo' ? 'fa-circle-check' : 'fa-triangle-exclamation';
                return `<div class="insight-point ${tipo}"><i class="fas ${icon} pi"></i><span>${escapeHtml(p.texto)}</span></div>`;
            }).join('');

            const rec = ins.recomendacao
                ? `<div class="insight-rec"><span class="rec-k">Recomendação</span>${escapeHtml(ins.recomendacao)}</div>`
                : '';

            area.innerHTML = `
                <div class="insight-resumo">${escapeHtml(ins.resumo) || 'Análise concluída.'}</div>
                ${pontosHtml ? `<div class="insight-points">${pontosHtml}</div>` : ''}
                ${rec}
                <div class="ai-note mt-2"><small>Gerado por IA a partir do seu histórico${miniStats(data.stats)}</small></div>
            `;
        }

        async function loadInsight() {
            const btn = document.getElementById('insightBtn');
            const area = document.getElementById('insightArea');
            btn.disabled = true;
            const original = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin me-1"></i>Analisando...';
            area.style.display = 'block';
            area.innerHTML = '<div class="ai-note"><i class="fas fa-spinner fa-spin me-1"></i>A IA está lendo seu histórico...</div>';
            try {
                const response = await fetch('/api/clients/performance-insight');
                const result = await response.json();
                if (!result.success) {
                    throw new Error(result.error || 'Falha na análise');
                }
                renderInsight(result);
            } catch (error) {
                area.innerHTML = `<div class="ai-note text-danger"><i class="fas fa-circle-exclamation me-1"></i>Erro ao gerar análise: ${escapeHtml(error.message)}</div>`;
            } finally {
                btn.disabled = false;
                btn.innerHTML = original;
            }
        }

        async function loadClients() {
            const container = document.getElementById('clientsList');
            try {
                const response = await fetch('/api/clients');
                const result = await response.json();

                if (!result.success || !result.clients || result.clients.length === 0) {
                    container.innerHTML = '<p class="text-secondary">Nenhum cliente ainda. Cadastre entregas em <a href="/entregas-clientes" class="text-info">Entregas de Clientes</a> pra popular as fichas.</p>';
                    document.getElementById('kpiRow').innerHTML = '';
                    return;
                }

                renderKpis(result.clients);

                container.innerHTML = result.clients.map((c, idx) => {
                    const aprovColor = c.taxa_aprovacao >= 70 ? 'good' : 'warn';
                    return `
                        <div class="client-card">
                            <div class="client-head">
                                <div class="avatar">${escapeHtml(initials(c.client_name))}</div>
                                <div>
                                    <div class="c-name">${escapeHtml(c.client_name) || '<span class="text-secondary">(sem nome)</span>'}</div>
                                    <div class="c-contact">${escapeHtml(c.client_contact) || '—'} · cliente desde ${formatDate(c.primeira)}</div>
                                </div>
                            </div>
                            <div class="tiles">
                                <div class="tile"><div class="t-k">Entregas</div><div class="t-v">${c.total}</div></div>
                                <div class="tile"><div class="t-k">Aprovação</div><div class="t-v ${aprovColor}">${c.taxa_aprovacao}%</div></div>
                                <div class="tile"><div class="t-k">Ajustes</div><div class="t-v">${c.ajustes}</div></div>
                                <div class="tile"><div class="t-k">Última entrega</div><div class="t-v" style="font-size:.95rem">${formatDate(c.ultima)}</div></div>
                            </div>
                            <button class="btn btn-sm btn-link toggle-btn ps-0 mt-2" id="togglebtn-${idx}" onclick="toggleHistory(${idx})">
                                <i class="fas fa-chevron-down me-1"></i>Ver histórico
                            </button>
                            <div class="history" id="hist-${idx}" style="display:none;">
                                ${historyHtml(c.deliveries)}
                            </div>
                        </div>
                    `;
                }).join('');

            } catch (error) {
                console.error('Erro ao carregar clientes:', error);
                container.innerHTML = '<p class="text-danger">Erro ao carregar clientes.</p>';
            }
        }

        loadClients();
    </script>
</body>
</html>
