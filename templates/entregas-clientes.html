<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entregas de Clientes - Locutores IA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #6366f1;
            --dark-bg: #0f172a;
            --card-bg: #1e293b;
            --border-color: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
        }
        body {
            background: linear-gradient(135deg, var(--dark-bg) 0%, #1a1f3a 100%);
            color: var(--text-primary);
            min-height: 100vh;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        .page-container {
            padding: 2rem;
            max-width: 1100px;
            margin: 0 auto;
        }
        .section-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .form-label { color: var(--text-secondary); }
        .form-control, .form-select {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
        }
        .form-control:focus, .form-select:focus {
            background: rgba(15, 23, 42, 0.8);
            border-color: var(--primary-color);
            color: var(--text-primary);
            box-shadow: none;
        }
        .delivery-card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 1.25rem;
            margin-bottom: 1rem;
        }
        .status-badge-pendente { background: #f59e0b; }
        .status-badge-aprovado { background: #22c55e; }
        .status-badge-ajuste_solicitado { background: #ef4444; }
        .back-link { color: var(--text-secondary); text-decoration: none; }
        .back-link:hover { color: var(--text-primary); }
        .feedback-box {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            padding: 0.65rem 0.85rem;
            color: #fca5a5;
        }
        .btn-whatsapp { background: #25d366; border-color: #25d366; color: #fff; }
        .btn-whatsapp:hover { background: #1ebe5a; border-color: #1ebe5a; color: #fff; }

        /* Pedidos do formulário público /solicitar */
        .pedido-card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 1rem 1.25rem;
            margin-bottom: .85rem;
        }
        .badge-pedido-novo { background: #eab308; color: #1a1a1a; }
        .badge-pedido-em_producao { background: #f97316; }
        .badge-pedido-aguardando_aprovacao { background: #3b82f6; }
        .badge-pedido-concluido { background: #22c55e; }
        .badge-pedido-cancelado { background: #64748b; }
        .pedido-roteiro {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: .55rem .75rem;
            font-size: .85rem;
            margin-top: .5rem;
            white-space: pre-wrap;
        }
        .pedido-meta { font-size: .78rem; color: var(--text-secondary); margin-top: .35rem; }
        .pedido-note {
            background: rgba(99, 102, 241, 0.12);
            border: 1px solid rgba(99, 102, 241, 0.35);
            border-radius: 8px;
            padding: .6rem .85rem;
            font-size: .85rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="page-container">
        <a href="/" class="back-link"><i class="fas fa-arrow-left me-2"></i>Voltar para Início</a>
        <h2 class="mt-3 mb-4"><i class="fas fa-user-check me-2"></i>Entregas de Clientes</h2>

        <div class="section-card">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
                <h5 class="mb-0"><i class="fas fa-inbox me-2"></i>Pedidos recebidos</h5>
                <button class="btn btn-sm btn-outline-light" onclick="copiarLinkSolicitar()">
                    <i class="fas fa-link me-1"></i>Copiar link do formulário
                </button>
            </div>
            <p class="text-secondary" style="font-size:.85rem;">Divulgue o link do formulário no WhatsApp/Instagram — os pedidos dos clientes caem aqui.</p>
            <div id="pedidosList"><p class="text-secondary">Carregando...</p></div>
        </div>

        <div class="section-card">
            <h5 class="mb-3">Cadastrar nova entrega</h5>
            <div id="pedidoVinculadoNote" class="pedido-note" style="display:none;"></div>
            <div class="mb-3">
                <label class="form-label">Nome do cliente</label>
                <input type="text" class="form-control" id="clientName" placeholder="Ex: Loja Fashion Center">
            </div>
            <div class="mb-3">
                <label class="form-label">Contato (WhatsApp ou e-mail)</label>
                <input type="text" class="form-control" id="clientContact" placeholder="Ex: (85) 99999-9999">
            </div>
            <div class="mb-3">
                <label class="form-label">Descrição do pedido</label>
                <textarea class="form-control" id="requestDescription" rows="2" placeholder="Ex: Spot 30s pra loja de roupas, tom energético"></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">Arquivo de áudio</label>
                <input type="file" class="form-control" id="audioFile" accept="audio/*">
            </div>
            <button class="btn btn-primary" id="uploadBtn" onclick="uploadDelivery()">
                <i class="fas fa-upload me-2"></i>Cadastrar Entrega
            </button>
        </div>

        <div class="section-card">
            <h5 class="mb-3">Entregas cadastradas</h5>
            <div id="deliveriesList">
                <p class="text-secondary">Carregando...</p>
            </div>
        </div>

        <!-- Input oculto usado pelo reenvio de versão corrigida (mesma entrega) -->
        <input type="file" id="newVersionInput" accept="audio/*" style="display: none;" onchange="uploadNewVersion()">
    </div>

    <script>
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text || '';
            return div.innerHTML;
        }

        function statusLabel(status) {
            if (status === 'aprovado') return 'Aprovado';
            if (status === 'ajuste_solicitado') return 'Ajuste Solicitado';
            return 'Pendente';
        }

        // Monta o botão de envio do link certo pro tipo de contato.
        // WhatsApp (wa.me) e e-mail (mailto) abrem já com a mensagem pronta —
        // sem API paga, sem SMTP: o operador só aperta enviar.
        function sendLinkButton(contact, clientName, approvalUrl) {
            const raw = (contact || '').trim();
            const msg = `Olá! Sua locução "${clientName}" está pronta. É só ouvir e aprovar por aqui: ${approvalUrl}`;

            if (raw.includes('@')) {
                const subject = encodeURIComponent('Aprovação da sua locução');
                const mailLink = `mailto:${encodeURIComponent(raw)}?subject=${subject}&body=${encodeURIComponent(msg)}`;
                return `<a href="${mailLink}" class="btn btn-sm btn-outline-info mt-2 me-2">
                            <i class="fas fa-envelope me-1"></i>Enviar por e-mail
                        </a>`;
            }

            let digits = raw.replace(/\D/g, '');
            if (!digits) return '';
            if (!digits.startsWith('55')) digits = '55' + digits;
            const waLink = `https://wa.me/${digits}?text=${encodeURIComponent(msg)}`;
            return `<a href="${waLink}" target="_blank" rel="noopener" class="btn btn-sm btn-whatsapp mt-2 me-2">
                        <i class="fab fa-whatsapp me-1"></i>Enviar no WhatsApp
                    </a>`;
        }

        // ---------- Pedidos (formulário público /solicitar) ----------
        const TIPO_LABELS = { spot_30s: 'Spot 30s', spot_60s: 'Spot 60s', vinheta: 'Vinheta', institucional_ura: 'Institucional/URA', outro: 'Outro' };
        const PEDIDO_STATUS_LABELS = { novo: 'Novo', em_producao: 'Em produção', aguardando_aprovacao: 'Aguardando aprovação', concluido: 'Concluído', cancelado: 'Cancelado' };
        let pedidosCache = {};
        let pedidoVinculado = null;

        function formatDateBr(iso) {
            if (!iso) return '';
            const d = new Date(iso);
            return isNaN(d) ? '' : d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' });
        }

        function copiarLinkSolicitar() {
            navigator.clipboard.writeText(`${window.location.origin}/solicitar`);
            alert('Link do formulário copiado! Divulgue no WhatsApp/Instagram.');
        }

        async function loadPedidos() {
            const container = document.getElementById('pedidosList');
            try {
                const response = await fetch('/api/pedidos');
                const result = await response.json();
                if (!result.success) throw new Error(result.error || 'Falha ao carregar pedidos');

                const pedidos = result.pedidos || [];
                pedidosCache = {};
                pedidos.forEach(p => { pedidosCache[p.id] = p; });

                if (pedidos.length === 0) {
                    container.innerHTML = '<p class="text-secondary mb-0">Nenhum pedido ainda. Copie o link do formulário e divulgue!</p>';
                    return;
                }

                container.innerHTML = pedidos.map(p => {
                    const tipo = TIPO_LABELS[p.tipo] || 'Outro';
                    const contato = [p.whatsapp, p.email].filter(Boolean).join(' · ');
                    const roteiro = p.roteiro
                        ? `<div class="pedido-roteiro">${escapeHtml(p.roteiro.length > 400 ? p.roteiro.slice(0, 400) + '…' : p.roteiro)}</div>`
                        : '';
                    const meta = [
                        p.estilo_voz ? `🎙 ${escapeHtml(p.estilo_voz)}` : '',
                        p.referencia_trilha ? `🎵 ${escapeHtml(p.referencia_trilha)}` : '',
                        p.prazo ? `⏱ ${escapeHtml(p.prazo)}` : ''
                    ].filter(Boolean).join(' &nbsp;·&nbsp; ');

                    let acoes = '';
                    if (p.status === 'novo') {
                        acoes = `
                            <button class="btn btn-sm btn-warning mt-2 me-2" onclick="mudarStatusPedido('${p.id}', 'em_producao')">
                                <i class="fas fa-play me-1"></i>Iniciar produção
                            </button>
                            <button class="btn btn-sm btn-outline-danger mt-2" onclick="cancelarPedido('${p.id}')">Cancelar</button>`;
                    } else if (p.status === 'em_producao') {
                        acoes = `
                            <button class="btn btn-sm btn-primary mt-2 me-2" onclick="criarEntregaDoPedido('${p.id}')">
                                <i class="fas fa-microphone me-1"></i>Criar entrega deste pedido
                            </button>
                            <button class="btn btn-sm btn-outline-danger mt-2" onclick="cancelarPedido('${p.id}')">Cancelar</button>`;
                    }

                    return `
                        <div class="pedido-card">
                            <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">
                                <div>
                                    <strong>${escapeHtml(p.cliente_nome)}</strong>
                                    <span class="badge bg-secondary ms-1">${tipo}</span>
                                    <span class="badge badge-pedido-${p.status} ms-1">${PEDIDO_STATUS_LABELS[p.status] || p.status}</span>
                                    <p class="text-secondary mb-0 mt-1"><small>${escapeHtml(contato)}</small></p>
                                </div>
                                <small class="text-secondary">${formatDateBr(p.created_at)}</small>
                            </div>
                            ${roteiro}
                            ${meta ? `<div class="pedido-meta">${meta}</div>` : ''}
                            ${acoes}
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error('Erro ao carregar pedidos:', error);
                container.innerHTML = '<p class="text-secondary mb-0">Pedidos indisponíveis (a tabela já foi criada no Supabase?).</p>';
            }
        }

        async function mudarStatusPedido(id, status) {
            try {
                const response = await fetch(`/api/pedidos/${id}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: status })
                });
                const result = await response.json();
                if (!result.success) throw new Error(result.error);
                loadPedidos();
            } catch (error) {
                alert(`Erro ao atualizar pedido: ${error.message}`);
            }
        }

        function cancelarPedido(id) {
            if (!confirm('Cancelar este pedido?')) return;
            mudarStatusPedido(id, 'cancelado');
        }

        function criarEntregaDoPedido(id) {
            const p = pedidosCache[id];
            if (!p) return;
            const tipo = TIPO_LABELS[p.tipo] || 'Outro';
            document.getElementById('clientName').value = p.cliente_nome || '';
            document.getElementById('clientContact').value = p.whatsapp || p.email || '';
            const partes = [tipo, p.estilo_voz, p.roteiro ? p.roteiro.slice(0, 160) : ''].filter(Boolean);
            document.getElementById('requestDescription').value = partes.join(' — ');
            pedidoVinculado = id;
            const note = document.getElementById('pedidoVinculadoNote');
            note.style.display = 'block';
            note.innerHTML = `<i class="fas fa-link me-1"></i>Criando entrega do pedido de <strong>${escapeHtml(p.cliente_nome)}</strong> (#${escapeHtml(String(id).slice(0, 8).toUpperCase())}). Ao cadastrar, o pedido vira "Aguardando aprovação". <a href="#" onclick="cancelarVinculo(); return false;" class="text-info">Desvincular</a>`;
            note.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function cancelarVinculo() {
            pedidoVinculado = null;
            document.getElementById('pedidoVinculadoNote').style.display = 'none';
        }

        // Sobe o arquivo direto pro Supabase Storage via signed upload URL
        // (contorna o limite ~4.5MB da serverless do Vercel). Retorna urlResult
        // com o .path pra salvar no registro.
        async function uploadAudioFile(file) {
            const urlResponse = await fetch('/api/client-deliveries/upload-url', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ filename: file.name })
            });
            const urlResult = await urlResponse.json();
            if (!urlResult.success) {
                throw new Error(urlResult.error);
            }

            const uploadFormData = new FormData();
            uploadFormData.append('file', file);
            const storageResponse = await fetch(urlResult.upload_url, {
                method: 'PUT',
                headers: {
                    'apikey': urlResult.apikey,
                    'Authorization': `Bearer ${urlResult.apikey}`
                },
                body: uploadFormData
            });
            if (!storageResponse.ok) {
                throw new Error('Falha ao enviar o arquivo para o armazenamento');
            }
            return urlResult;
        }

        async function uploadDelivery() {
            const clientName = document.getElementById('clientName').value.trim();
            const clientContact = document.getElementById('clientContact').value.trim();
            const requestDescription = document.getElementById('requestDescription').value.trim();
            const fileInput = document.getElementById('audioFile');
            const file = fileInput.files[0];
            const uploadBtn = document.getElementById('uploadBtn');

            if (!clientName) {
                alert('Informe o nome do cliente.');
                return;
            }
            if (!file) {
                alert('Selecione um arquivo de áudio.');
                return;
            }

            uploadBtn.disabled = true;
            uploadBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Enviando...';

            try {
                const urlResult = await uploadAudioFile(file);

                const createResponse = await fetch('/api/client-deliveries', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        client_name: clientName,
                        client_contact: clientContact,
                        request_description: requestDescription,
                        storage_path: urlResult.path,
                        file_size: file.size,
                        mime_type: file.type,
                        pedido_id: pedidoVinculado || ''
                    })
                });
                const createResult = await createResponse.json();
                if (!createResult.success) {
                    throw new Error(createResult.error);
                }

                alert('Entrega cadastrada com sucesso!');
                document.getElementById('clientName').value = '';
                document.getElementById('clientContact').value = '';
                document.getElementById('requestDescription').value = '';
                fileInput.value = '';
                cancelarVinculo();
                loadDeliveries();
                loadPedidos();

            } catch (error) {
                console.error('Erro no cadastro:', error);
                alert(`Erro ao cadastrar entrega: ${error.message}`);
            } finally {
                uploadBtn.disabled = false;
                uploadBtn.innerHTML = '<i class="fas fa-upload me-2"></i>Cadastrar Entrega';
            }
        }

        async function loadDeliveries() {
            const container = document.getElementById('deliveriesList');
            try {
                const response = await fetch('/api/client-deliveries');
                const result = await response.json();

                if (!result.success || !result.deliveries || result.deliveries.length === 0) {
                    container.innerHTML = '<p class="text-secondary">Nenhuma entrega cadastrada ainda.</p>';
                    return;
                }

                container.innerHTML = result.deliveries.map(d => {
                    const approvalUrl = `${window.location.origin}/aprovacao/${d.id}`;
                    const amostraPlayer = d.amostra_url
                        ? `<div class="mt-2"><small><i class="fas fa-music me-1"></i>Amostra de voz enviada pelo cliente (estilo desejado):</small>
                               <audio controls class="w-100 mt-1" src="${d.amostra_url}"></audio>
                           </div>`
                        : '';
                    const feedbackBox = (d.status === 'ajuste_solicitado' && (d.feedback || d.amostra_url))
                        ? `<div class="feedback-box mt-2">
                               <i class="fas fa-comment-dots me-1"></i><strong>Ajuste pedido:</strong> ${escapeHtml(d.feedback) || '<em>(sem comentário)</em>'}
                               ${amostraPlayer}
                           </div>`
                        : '';
                    const newVersionBtn = (d.status === 'ajuste_solicitado')
                        ? `<button class="btn btn-sm btn-warning mt-2 me-2" onclick="promptNewVersion('${d.id}')">
                               <i class="fas fa-rotate me-1"></i>Enviar versão corrigida
                           </button>`
                        : '';
                    return `
                        <div class="delivery-card">
                            <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">
                                <div>
                                    <strong>${escapeHtml(d.client_name)}</strong>
                                    <span class="badge status-badge-${d.status} ms-2">${statusLabel(d.status)}</span>
                                    <p class="text-secondary mb-0 mt-1">${escapeHtml(d.request_description)}</p>
                                    <p class="text-secondary mb-0"><small>${escapeHtml(d.client_contact)}</small></p>
                                </div>
                                <div>
                                    <button class="btn btn-sm btn-outline-danger" onclick="deleteDelivery('${d.id}')">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </div>
                            </div>
                            <audio controls class="w-100 mt-2" src="${d.playback_url || ''}"></audio>
                            ${feedbackBox}
                            <div class="mt-2">
                                ${newVersionBtn}
                                ${sendLinkButton(d.client_contact, d.client_name, approvalUrl)}
                                <button class="btn btn-sm btn-outline-light mt-2" onclick="copyApprovalLink('${approvalUrl}')">
                                    <i class="fas fa-link me-1"></i>Copiar link
                                </button>
                            </div>
                        </div>
                    `;
                }).join('');

            } catch (error) {
                console.error('Erro ao carregar entregas:', error);
                container.innerHTML = '<p class="text-danger">Erro ao carregar entregas.</p>';
            }
        }

        function copyApprovalLink(url) {
            navigator.clipboard.writeText(url);
            alert('Link copiado para a área de transferência!');
        }

        // Reenvio de versão corrigida: abre o seletor de arquivo pra ESTA entrega.
        let newVersionDeliveryId = null;
        function promptNewVersion(id) {
            newVersionDeliveryId = id;
            const input = document.getElementById('newVersionInput');
            input.value = '';
            input.click();
        }

        async function uploadNewVersion() {
            const input = document.getElementById('newVersionInput');
            const file = input.files[0];
            if (!file || !newVersionDeliveryId) return;

            const deliveryId = newVersionDeliveryId;
            newVersionDeliveryId = null;
            try {
                const urlResult = await uploadAudioFile(file);
                const resp = await fetch(`/api/client-deliveries/${deliveryId}/new-version`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        storage_path: urlResult.path,
                        file_size: file.size,
                        mime_type: file.type
                    })
                });
                const result = await resp.json();
                if (!result.success) {
                    throw new Error(result.error);
                }
                alert('Nova versão enviada! A entrega voltou para Pendente — reenvie o link pro cliente.');
                loadDeliveries();
            } catch (error) {
                alert(`Erro ao enviar nova versão: ${error.message}`);
            }
        }

        async function deleteDelivery(id) {
            if (!confirm('Tem certeza que deseja excluir esta entrega?')) return;
            try {
                const response = await fetch(`/api/client-deliveries/${id}`, { method: 'DELETE' });
                const result = await response.json();
                if (!result.success) {
                    throw new Error(result.error);
                }
                loadDeliveries();
            } catch (error) {
                alert(`Erro ao excluir: ${error.message}`);
            }
        }

        loadDeliveries();
        loadPedidos();
    </script>
</body>
</html>
